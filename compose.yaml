x-postgres-base: &postgres-base
  image: postgres:16
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
    interval: 10s
    retries: 5
    start_period: 10s
    timeout: 10s
  env_file:
    - .env
  environment:
    - PGDATA=/var/lib/postgresql/data/pgdata
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
    - POSTGRES_USER=${POSTGRES_USER?Variable not set}
    - POSTGRES_DB=${POSTGRES_DB?Variable not set}

x-app-base: &api-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    - ENVIRONMENT=${ENVIRONMENT}
    - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
    - SECRET_KEY=${SECRET_KEY?Variable not set}
    - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
    - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
    - POSTGRES_PORT=${POSTGRES_PORT}
    - POSTGRES_DB=${POSTGRES_DB}
    - POSTGRES_USER=${POSTGRES_USER?Variable not set}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
    - OTEL_PROPAGATORS=${OTEL_PROPAGATORS}
    - OTEL_PYTHON_LOG_CORRELATION=${OTEL_PYTHON_LOG_CORRELATION}
    - OTEL_TRACES_EXPORTER=${OTEL_TRACES_EXPORTER}
    - OTEL_PYTHON_LOG_FORMAT=${OTEL_PYTHON_LOG_FORMAT}
    - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
    - OTEL_PYTHON_LOG_LEVEL=${OTEL_PYTHON_LOG_LEVEL}

services:
  # admin:
  #   image: dpage/pgadmin4
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: lukerayn@gmail.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #     PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
  #     PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: 1
  #     PGADMIN_LISTEN_PORT: 80
  #   ports:
  #     - 5555:80
  #   restart: unless-stopped
  #   env_file:
  #     - .env
  #   networks:
  #     - dev

  db-dev:
    profiles: 
      - dev
      - adot
    <<: *postgres-base
    ports:
      - 8081:5432
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    networks:
      - dev
      - adot
      - xroad-network
    restart: always
    

  api-dev:
    profiles: 
      - dev
      - adot
    container_name: api-dev-tshwane
    command: sh -c "alembic upgrade head && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    <<: *api-base
    build:
      args:
        ENV: dev
        POETRY_VERSION: ${POETRY_VERSION}
    develop:
      watch:
        - path: ./src
          action: sync
          target: /usr/src/
    depends_on:
      db-dev:
        condition: service_healthy
        restart: true
    environment:
      - POSTGRES_SERVER=${POSTGRES_SERVER}
    ports:
      - 8000:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev
      - adot
      - xroad-network
    restart: always

  aws-ot-collector:
    image: public.ecr.aws/aws-observability/aws-otel-collector:latest
    profiles:
      - adot
    networks:
      - adot
      - xroad-network
    container_name: collector
    command: ["--config=/etc/otel-agent-config.yaml"]
    # environment:
    #  - AWS_REGION=eu-west-1
    #  - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
    #  - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}


    volumes:
      - ./src/app/otel-agent-config.yaml:/etc/otel-agent-config.yaml
    ports:
      - "1777:1777"   # pprof extension
      - "55679:55679" # zpages extension
      - "13133"       # health_check

  db-test:
    profiles: ["test"]
    <<: *postgres-base
    networks:
      - test
      - xroad-network
    restart: always

  api-test:
    profiles: ["test"]
    <<: *api-base
    command: sh -c "alembic upgrade head && python -m pytest -s -vv"
    build:
      args:
        ENV: test
        POETRY_VERSION: ${POETRY_VERSION}
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      - POSTGRES_SERVER=db-test
    networks:
      - test
      - xroad-network
    restart: always

networks:
  test:
  dev:
  adot:
  xroad-network:
    external: true

volumes:
  app-db-data: